<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/logo-kapali.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yeni Not Defteri</title>
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #EFEFEF;
        background-image: radial-gradient(circle, #d1d5db 1px, transparent 1px);
        background-size: 22px 22px;
        z-index: 9999;
        transition: opacity 0.25s ease;
      }
      #app-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .loader-card {
        background: white;
        border-radius: 16px;
        border: 1px solid rgba(0,0,0,0.08);
        box-shadow: 0 24px 60px -12px rgba(0,0,0,0.13), 0 4px 16px -4px rgba(0,0,0,0.06);
        padding: 40px 48px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        min-width: 220px;
      }
      .loader-ring {
        width: 36px;
        height: 36px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #DC2626;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loader-text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: #6b7280;
        letter-spacing: 0.01em;
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="loader-card">
        <div class="loader-ring"></div>
        <span class="loader-text">Yükleniyor...</span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
